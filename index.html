      :root {
        color-scheme: light;
        --page: #ffffff;
        --text: #050505;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: var(--page);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
      }

      .page {
        min-height: 100svh;
        display: grid;
        grid-template-rows: 1fr auto;
        padding: clamp(24px, 5vw, 48px);
        overflow: hidden;
      }

      .hero {
        min-height: 0;
        display: grid;
        align-items: start;
        justify-items: start;
      }

      .hero__image {
        display: block;
        width: min(42vw, 430px);
        height: auto;
        max-height: min(78svh, 650px);
        object-fit: contain;
      }

      .contact {
        margin: 0;
        font-size: clamp(16px, 1.7vw, 20px);
        line-height: 1.45;
        font-weight: 400;
      }

      .contact a {
        color: inherit;
        text-decoration: none;
      }

      .contact a:hover {
        text-decoration: underline;
      }

      @media (min-width: 960px) {
        .page {
          padding-left: max(38px, calc((100vw - 1200px) / 2 + 38px));
          padding-right: max(38px, calc((100vw - 1200px) / 2 + 38px));
        }

        .hero__image {
          transform: translateX(calc(-1 * min(8vw, 120px)));
        }
      }

      @media (max-width: 959px) {
        .page {
          padding: 32px;
        }

        .hero {
          align-items: start;
          justify-items: center;
        }

        .hero__image {
          margin-top: clamp(56px, 12svh, 96px);
          width: min(68vw, 360px);
          max-height: 72svh;
        }

        .contact {
          justify-self: end;
          max-width: 56vw;
        }
      }

      @media (max-width: 639px) {
        .page {
          padding: 28px 20px 22px;
        }

        .hero__image {
          width: min(76vw, 310px);
          max-height: 70svh;
        }

        .contact {
          justify-self: start;
          max-width: 100%;
          font-size: 16px;
        }
      }

      @media (max-width: 360px) {
        .page {
          padding-inline: 16px;
        }

        .hero__image {
          width: 82vw;
        }
      }
